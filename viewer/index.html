<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cybermem Viewer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Cybermem</div>
          <h1>Memory</h1>
        </div>
        <div class="mode-toggle" role="tablist" aria-label="View mode">
          <button id="catalogMode" class="mode-button is-active" type="button">Catalog</button>
          <button id="graphMode" class="mode-button" type="button">Graph</button>
        </div>
      </header>

      <section class="workspace-band" aria-label="Workspace">
        <label for="workspaceSelect">Workspace</label>
        <select id="workspaceSelect"></select>
      </section>

      <section class="stats-grid" id="statsGrid" aria-label="Memory stats"></section>

      <section class="toolbar" aria-label="Filters">
        <input id="searchInput" type="search" placeholder="Search memory" autocomplete="off">
        <div class="type-strip" id="typeStrip"></div>
      </section>

      <section class="feed" id="feed" aria-live="polite"></section>

      <section class="graph-panel" id="graphPanel" hidden>
        <div class="graph-summary" id="graphSummary"></div>
        <div class="graph-canvas" id="graphCanvas"></div>
        <aside class="graph-detail" id="graphDetail" hidden></aside>
      </section>
    </main>

    <div class="evidence-modal" id="evidenceModal" hidden>
      <section class="evidence-panel" role="dialog" aria-modal="true" aria-labelledby="evidenceTitle">
        <header class="evidence-panel-head">
          <div>
            <div class="eyebrow">Evidence</div>
            <h2 id="evidenceTitle">Memory evidence</h2>
          </div>
          <button id="evidenceClose" class="modal-close" type="button">Close</button>
        </header>
        <div class="evidence-list" id="evidenceList"></div>
      </section>
    </div>

    <script src="/vendor/cytoscape/cytoscape.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
